<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>firstPage</title>
    <style>
        body{
            margin: 0;
            padding: 0;
            background-image: url("background.jpg");
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size:cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        body img{
            width: 100px;
            height: 100px;
            background-color: transparent;
        }
        .container1{
            margin:150px;
            padding: 40px;
            height: 450px;
            width: 600px;
            background:rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login{
            width: 320px;
            padding: 40px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            text-align: center;
            color: darkblue; 
        }
        .login h2{
            text-align: left;
            color: darkblue;
        }
        .login h4{
            margin: 5px;
            text-align: left;
            color: darkblue;
        }
        .login input{
            width: 300px;
            padding: 10px;
        }
        .login  .forgot{
            margin-top: 5px;
            text-align:left;
            color: darkblue;
        }
        .login button{
            margin-top: 10px;
            margin-bottom: 10px;
            padding: 10px;
            width: 175px;
            background-color:rgb(4, 4, 154);
            text-align: center;
            color: whitesmoke;
        }
         .social {
            display: flex;
            justify-content: space-between;
        }
        .social button {
            width: 25%;
            padding: 15px;
            background: #fff;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }
        .social img{
            width: 30px;
            height: 20px;
        }
        .register span{
            color:red;

        }

    </style>
</head>
<body>
    <div class="container1">
        <div class="login">
            <img src="login_logo.jpg">
            <h2>Login</h2>
            <h4>Email</h4>
            <input type="email" placeholder="username@gmail.com">
            <h4>Password</h4>
            <input type="password" placeholder="Password">

            <div class="forgot">Forgot Password?</div>

            <button>Sign in</button>

            <div class="divider">or continue with</div>

            <div class="social">
                <button><img src="google.png" alt="G"></button>
                <button><img src="github.png" alt="Git"></button> 
                <button><img src="facebook.png" alt="f"></button>
                <button><img src="instagram.jpg" alt="I"></button>
           </div>

    <div class="register">
      Don’t have an account? <span>Register</span>
    </div>
    </div>  
</body>
</html>
